services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: baldantour
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - "./seed:/app/seed"
      - "./embeddings:/app/embeddings"
      - "./db:/app/db"
      # Optional: mount your full parsed CSVs to auto-import at startup.
      # - "D:/asoiu/Распаршенные страны:/data/parsed:ro"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18000:8000"
    # Enable if you want to compute embeddings on GPU at startup.
    # gpus: all

volumes:
  pgdata:
    name: baldantour_backend_pgdata
