# backend/pytest.ini
[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
pythonpath = .
addopts = 
    --verbose
    --tb=short
    --cov=tours
    --cov=accounts
    --cov-report=html
    --cov-report=term-missing
filterwarnings =
    ignore::DeprecationWarning
    ignore::django.utils.deprecation.RemovedInDjango60Warning
