services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_WAIT_SECONDS: 60
      PRELOAD_EMBEDDING_MODEL: 1
      EMBEDDINGS_PROVIDER: sentence_transformers
      ST_EMBEDDING_MODEL: intfloat/multilingual-e5-base
      AI_RERANKER_ENABLED: 1
      AI_LLM_RERANKER_MODEL: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
      HF_HOME: /models/huggingface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app 
      - huggingface_cache:/models/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 5s
      timeout: 3s 
      retries: 10 
      start_period: 15s
    restart: unless-stopped
      
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  parser-builder:
    build:
      context: .
      dockerfile: parser/Dockerfile
      args:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_HOST: host.docker.internal
        POSTGRES_PORT: ${POSTGRES_PORT}
    image: parser-app:latest
    command: echo "Образ parser-app:latest собран"
    profiles:
      - build

  parser-bootstrap:
    image: parser-app:latest
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command:
      - sh
      - -lc
      - >
        sleep 600 &&
        python -u -m parser.main
        --headless
        --reset-output
        --root /app
        --out-csv /app/output/result.csv
        --out-json /app/output/result.json
        --stop-flag /app/output/STOP.flag
        --max-hotels 0
        --max-towns 0
        --max-countries 0
        --country-workers 1

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: parser-scheduler
    restart: unless-stopped
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Europe/Moscow
    labels:
      ofelia.job-run.parser.schedule: "0 0 22 * * 0"
      ofelia.job-run.parser.image: "parser-app:latest"
      ofelia.job-run.parser.command: >
        python -u -m parser.main
        --headless
        --reset-output
        --root /app
        --out-csv /app/output/result.csv
        --out-json /app/output/result.json
        --stop-flag /app/output/STOP.flag
        --max-hotels 0
        --max-towns 0
        --max-countries 0
        --country-workers 1
      ofelia.job-run.parser.autoRemove: "true"
      ofelia.job-run.parser.no-overlap: "true"
    
      ofelia.job-run.parser.runtime-flags: >
        --shm-size=2gb
        --init
        --env TZ=Europe/Moscow
        --env POSTGRES_HOST=host.docker.internal
        --env POSTGRES_PORT=${POSTGRES_PORT}
        --cpus="2"
        --memory="4g"
        --memory-swap="4g"
        --pids-limit=100
        --oom-kill-disable
    
      ofelia.job-run.parser.notify.success: "true"
      ofelia.job-run.parser.notify.error: "true"

volumes:
  pgdata:
  huggingface_cache:
