services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tour_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-tour_aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tour_aggregator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./db/restore.sh:/docker-entrypoint-initdb.d/01-restore.sh:ro
      - ./db/data.dump:/docker-entrypoint-initdb.d/data.dump:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-tour_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-tour_aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tour_aggregator}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_WAIT_SECONDS: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/fx/rub/"]
      interval: 5s
      timeout: 3s 
      retries: 10 
      start_period: 15s
      
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  parser-builder:
    build:
      context: ./parser
      args:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_HOST: db
        POSTGRES_PORT: 5432
    image: parser-app:latest
    command: echo "Успешно собрано!"

  scheduler:
    image: mcuadros/ofelia:latest
    env_file:
      - .env
    container_name: parser-app-scheduler
    depends_on:
      - db
      - parser-builder
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.job-run.parser.schedule: "0 26 * * * *"
      ofelia.job-run.parser.image: "parser-app:latest"
      ofelia.job-run.parser.command: "python /app/main.py --headless --reset-output --out-csv /tmp/output.csv --out-json /tmp/output.json --stop-flag /tmp/STOP.flag"
      ofelia.job-run.parser.autoRemove: "true"
      ofelia.job-run.parser.no-overlap: "true"
      ofelia.job-run.parser.runtime-flags: "--shm-size=1gb --init"

volumes:
  pgdata: